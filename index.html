<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Echo English · Lance</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:16px;line-height:1.6;color:#1a1a2e;background:#f8f9fa;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}

  /* ── Dark Mode ── */
  body.dark{background:#0f0f1a;color:#e0e0e0}
  body.dark .card{background:#16213e;box-shadow:0 1px 4px rgba(0,0,0,.3)}
  body.dark .stat{background:#16213e}
  body.dark .tab-btn{color:#6c757d}
  body.dark .tab-btn.active{color:#6cb4ee;border-bottom-color:#6cb4ee}
  body.dark .cat-btn{color:#6c757d;background:#1a1a2e}
  body.dark .cat-btn.active{background:#16213e;color:#6cb4ee}
  body.dark .week-btn{color:#6c757d}
  body.dark .week-btn.active{color:#6cb4ee}
  body.dark .item{background:#1a1a2e}
  body.dark .item .title{color:#e0e0e0}
  body.dark .item .meta{color:#888}
  body.dark .focus-card{background:linear-gradient(135deg,#1a237e,#311b92) !important}
  body.dark .toolbar-btn{background:#1a1a2e;color:#adb5bd;border-color:#2d3436}
  body.dark .login-box{background:#16213e}
  body.dark .login-box input{background:#1a1a2e;border-color:#2d3436;color:#e0e0e0}
  body.dark .login-box h1{color:#e0e0e0}
  body.dark .back-btn{background:#1a1a2e;border-color:#2d3436;color:#adb5bd}
  body.dark .lesson-frame{border-color:#2d3436;background:#16213e}
  body.dark .footer{color:#444}

  /* ── Login ── */
  #login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f0f1a;display:flex;align-items:center;justify-content:center;z-index:9999}
  #login-screen.hidden{display:none}
  .login-box{background:#16213e;border-radius:16px;padding:36px 28px;width:88%;max-width:360px;text-align:center}
  .login-box h1{font-size:22px;color:#e0e0e0;margin-bottom:4px}
  .login-box p{font-size:14px;color:#888;margin-bottom:20px}
  .login-box input{width:100%;padding:14px;border:1px solid #2d3436;border-radius:10px;background:#0f0f1a;color:#e0e0e0;font-size:16px;outline:none}
  .login-box input:focus{border-color:#6cb4ee}
  .login-box button{width:100%;padding:14px;margin-top:10px;background:#4a90d9;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
  .login-box .error{color:#ef5350;font-size:13px;margin-top:8px;display:none}

  /* ── Layout ── */
  #content{display:none;max-width:640px;margin:0 auto;padding:0 0 60px}
  #content.show{display:block}

  .top-bar{position:sticky;top:0;z-index:100;background:#f8f9fa;padding:16px 16px 0;transition:background .3s}
  body.dark .top-bar{background:#0f0f1a}

  /* ── Toolbar ── */
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .toolbar h1{font-size:20px;font-weight:700}
  .toolbar-actions{display:flex;gap:6px}
  .toolbar-btn{width:36px;height:36px;border-radius:8px;border:1px solid #e9ecef;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .2s}

  /* ── Week Tabs ── */
  .week-tabs{display:flex;gap:0;overflow-x:auto;padding:4px 0 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .week-tabs::-webkit-scrollbar{display:none}
  .week-btn{flex-shrink:0;padding:8px 14px;font-size:13px;font-weight:600;color:#6c757d;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
  .week-btn.active{color:#1a1a2e;border-bottom-color:#4a90d9}

  /* ── Category Tabs ── */
  .cat-tabs{display:flex;gap:8px;margin:0 0 12px}
  .cat-btn{padding:6px 16px;border-radius:16px;font-size:13px;font-weight:600;border:none;cursor:pointer;background:#e9ecef;color:#495057;transition:all .2s}
  .cat-btn.active{background:#4a90d9;color:#fff}

  /* ── Focus Card ── */
  .focus-card{display:none;background:linear-gradient(135deg,#e3f2fd,#f3e5f5);border-radius:12px;padding:14px 16px;margin:0 0 14px}
  .focus-card.show{display:flex;align-items:center;gap:12px}
  .focus-card .fi{flex:1}
  .focus-card .fi-t{font-size:14px;font-weight:600;color:#1a1a2e}
  .focus-card .fi-s{font-size:12px;color:#6c757d;margin-top:2px}
  .focus-card .fi-b{padding:7px 16px;background:#4a90d9;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}

  /* ── Items ── */
  .section-label{font-size:12px;font-weight:600;color:#6c757d;text-transform:uppercase;letter-spacing:.5px;margin:0 0 8px}
  .item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;display:flex;align-items:center;gap:10px;transition:box-shadow .2s}
  .item:active{box-shadow:0 1px 6px rgba(0,0,0,.1)}
  .item .ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .item .info{flex:1;min-width:0}
  .item .title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .meta{font-size:11px;color:#6c757d;margin-top:1px}
  .item .tag{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;flex-shrink:0}
  .tag.today{background:#fff3e0;color:#e65100}
  .tag.done{background:#e8f5e9;color:#2e7d32}
  .tag.upcoming{background:#e3f2fd;color:#1565c0}
  .tag.word{background:#fce4ec;color:#c62828;font-size:9px}

  /* ── Detail ── */
  #detail{display:none;max-width:640px;margin:0 auto;padding:12px 16px 60px}
  #detail.show{display:block}
  .back-btn{display:inline-flex;align-items:center;gap:4px;padding:7px 12px;background:#fff;border:1px solid #e9ecef;border-radius:8px;cursor:pointer;font-size:13px;color:#495057;margin-bottom:12px}
  .lesson-frame{border:1px solid #e9ecef;border-radius:12px;overflow:hidden;background:#fff}
  .lesson-frame iframe{width:100%;height:100dvh;border:none;display:block}

  /* ── Empty State ── */
  .empty{padding:40px 20px;text-align:center;color:#adb5bd;font-size:14px;line-height:1.8}
  .empty .big{font-size:36px;margin-bottom:8px}

  /* ── Footer ── */
  .footer{text-align:center;padding:24px 0;font-size:11px;color:#adb5bd}

  @media(max-width:480px){
    .toolbar h1{font-size:18px}
    .week-btn{padding:6px 10px;font-size:12px}
    .top-bar{padding:12px 12px 0}
    #content{padding:0 0 40px}
    .item{padding:10px 12px}
    .item .title{font-size:13px}
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 Echo English</h1>
    <p>Lance's Learning Hub</p>
    <input type="password" id="pw" placeholder="Enter password" autofocus onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Unlock</button>
    <div class="error" id="login-err">Incorrect password</div>
  </div>
</div>

<!-- Main -->
<div id="content">
  <div class="top-bar">
    <div class="toolbar">
      <h1>📚 Echo</h1>
      <div class="toolbar-actions">
        <button class="toolbar-btn" onclick="toggleDark()" id="darkBtn" title="Dark mode">🌙</button>
        <button class="toolbar-btn" onclick="goFullscreen()" id="fsBtn" title="Fullscreen">⛶</button>
      </div>
    </div>
    <div class="week-tabs" id="weekTabs"></div>
    <div class="cat-tabs" id="catTabs" style="margin-top:8px"></div>
  </div>

  <!-- Focus Card -->
  <div class="focus-card" id="focusCard">
    <div class="fi">
      <div class="fi-t" id="focusTitle"></div>
      <div class="fi-s" id="focusMeta"></div>
    </div>
    <button class="fi-b" onclick="openFocus()">▶ Open</button>
  </div>

  <!-- List -->
  <div id="itemList"></div>
  <div class="footer">Echo · daily</div>
</div>

<!-- Detail -->
<div id="detail">
  <button class="back-btn" onclick="closeDetail()">← Back</button>
  <div class="lesson-frame"><iframe id="iframe" srcdoc=""></iframe></div>
</div>

<script>
/* ===== CONFIG ===== */
const PWH = 'b900e5bd0b61b382086d2be1fd6249a48416e5f87e2cb1fd6b8f346584520e0c';

const lessons = [
  // Week 1: Jun 28 - Jul 5
  {d:'2026-06-28',w:'Mon',t:'leverage',i:'💡',g:'word',f:'lessons/2026-06-28_wotd_leverage.html'},
  {d:'2026-06-29',w:'Mon',t:'职场表达 · SA自我介绍',i:'🏢',g:'lesson',f:'lessons/2026-06-29_monday_workplace.html'},
  {d:'2026-06-29',w:'Mon',t:'tailor',i:'💡',g:'word',f:'lessons/2026-06-29_wotd_tailor.html'},
  {d:'2026-06-30',w:'Tue',t:'阅读训练 · AI文章',i:'📖',g:'lesson',f:'lessons/2026-06-30_tuesday_reading.html'},
  {d:'2026-06-30',w:'Tue',t:'identify',i:'💡',g:'word',f:'lessons/2026-06-30_wotd_identify.html'},
  {d:'2026-07-01',w:'Wed',t:'口语场景 · 向客户介绍AI',i:'🎤',g:'lesson',f:'lessons/2026-07-01_wednesday_speaking.html'},
  {d:'2026-07-01',w:'Wed',t:'enable',i:'💡',g:'word',f:'lessons/2026-07-01_wotd_enable.html'},
  {d:'2026-07-02',w:'Thu',t:'词汇升级 · 5组动词升级',i:'🔥',g:'lesson',f:'lessons/2026-07-02_thursday_vocab.html'},
  {d:'2026-07-02',w:'Thu',t:'implement',i:'💡',g:'word',f:'lessons/2026-07-02_wotd_implement.html'},
  {d:'2026-07-03',w:'Fri',t:'听力训练 · TED影子跟读',i:'🎬',g:'lesson',f:'lessons/2026-07-03_friday_listening.html'},
  {d:'2026-07-03',w:'Fri',t:'optimize',i:'💡',g:'word',f:'lessons/2026-07-03_wotd_optimize.html'},
  {d:'2026-07-04',w:'Sat',t:'align',i:'💡',g:'word',f:'lessons/2026-07-04_wotd_align.html'},
  {d:'2026-07-05',w:'Sun',t:'streamline',i:'💡',g:'word',f:'lessons/2026-07-05_wotd_streamline.html'},
  {d:'2026-07-05',w:'Sun',t:'外教课准备包',i:'🎯',g:'lesson',f:'lessons/2026-07-05_sunday_class_prep.html'},

  // Week 2: Jul 6 - 12 (words only, lessons ready by Sun 7/5)
  {d:'2026-07-06',w:'Mon',t:'negotiate',i:'💡',g:'word',f:'lessons/2026-07-06_wotd_negotiate.html'},
  {d:'2026-07-07',w:'Tue',t:'automate',i:'💡',g:'word',f:'lessons/2026-07-07_wotd_automate.html'},
  {d:'2026-07-08',w:'Wed',t:'demonstrate',i:'💡',g:'word',f:'lessons/2026-07-08_wotd_demonstrate.html'},
  {d:'2026-07-09',w:'Thu',t:'evaluate',i:'💡',g:'word',f:'lessons/2026-07-09_wotd_evaluate.html'},
  {d:'2026-07-10',w:'Fri',t:'collaborate',i:'💡',g:'word',f:'lessons/2026-07-10_wotd_collaborate.html'},
  {d:'2026-07-11',w:'Sat',t:'integrate',i:'💡',g:'word',f:'lessons/2026-07-11_wotd_integrate.html'},
  {d:'2026-07-12',w:'Sun',t:'adopt',i:'💡',g:'word',f:'lessons/2026-07-12_wotd_adopt.html'}
];

/* ===== STATE ===== */
let currentWeek = '';
let currentCat = 'all';
let todayStr; // set in init()

/* ===== PASSWORD ===== */
async function sha256(s){const b=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function login(){const v=document.getElementById('pw').value;if(await sha256(v)===PWH){sessionStorage.setItem('ea','1');document.getElementById('login-screen').classList.add('hidden');init()}else{document.getElementById('login-err').style.display='block';document.getElementById('pw').value='';document.getElementById('pw').focus()}}

/* ===== INIT ===== */
function init(){
  document.getElementById('content').classList.add('show');
  todayStr=new Date().toISOString().slice(0,10);
  buildWeeks();
  restoreState();
  render();
}

function getWeekStart(d){const dt=new Date(d);const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);return dt.toISOString().slice(0,10)}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}

/* ===== BUILD WEEKS ===== */
function buildWeeks(){
  const groups={};
  lessons.forEach(l=>{const ws=getWeekStart(l.d);if(!groups[ws])groups[ws]=[];groups[ws].push(l)});
  const keys=Object.keys(groups).sort();
  const tabs=document.getElementById('weekTabs');
  tabs.innerHTML='';

  // Find current week
  const todayStr2=new Date().toISOString().slice(0,10);
  let found=false;
  keys.forEach(k=>{
    const end=addDays(k,6);
    const btn=document.createElement('button');
    btn.className='week-btn';
    btn.textContent=`${k.slice(5)}-${end.slice(5)}`;
    btn.dataset.week=k;
    btn.onclick=()=>switchWeek(k);
    tabs.appendChild(btn);
    if(todayStr2>=k&&todayStr2<=end&&!found){currentWeek=k;found=true}}
  });
  if(!currentWeek&&keys.length>0)currentWeek=keys[keys.length-1];

  // Category tabs (inside top bar after week tabs)
  const ct=document.getElementById('catTabs');
  ct.innerHTML='';
  ['all','lessons','words'].forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c===currentCat?' active':'');
    b.textContent=c==='all'?'All':c==='lessons'?'📖 Lessons':'💡 Words';
    b.onclick=()=>switchCat(c);
    ct.appendChild(b);
  });
}

/* ===== SWITCH ===== */
function switchWeek(w){
  currentWeek=w;
  saveState();
  render();
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.toggle('active',b.dataset.week===w));
}
function switchCat(c){
  currentCat=c;
  saveState();
  render();
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(c==='all'?'All':c==='lessons'?'Lessons':'Words')));
}

function saveState(){
  try{sessionStorage.setItem('ew',currentWeek);sessionStorage.setItem('ec',currentCat)}catch(e){}
}
function restoreState(){
  try{
    const w=sessionStorage.getItem('ew');if(w)currentWeek=w;
    const c=sessionStorage.getItem('ec');if(c)currentCat=c;
  }catch(e){}
}

/* ===== RENDER ===== */
function render(){
  const end=addDays(currentWeek,6);
  let items=lessons.filter(l=>l.d>=currentWeek&&l.d<=end);
  if(currentCat==='lessons'){items=items.filter(l=>l.g==='lesson')}
  else if(currentCat==='words'){items=items.filter(l=>l.g==='word')}

  // Update tab highlights
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.toggle('active',b.dataset.week===currentWeek));
  document.querySelectorAll('.cat-btn').forEach(b=>{
    const c=b.textContent.includes('All')?'all':b.textContent.includes('Lessons')?'lessons':'words';
    b.classList.toggle('active',c===currentCat);
  });

  // Focus card
  const fc=document.getElementById('focusCard');
  const todayItems=items.filter(l=>l.d===todayStr);
  if(todayItems.length>0){
    fc.classList.add('show');
    document.getElementById('focusTitle').textContent=todayItems[0].t;
    document.getElementById('focusMeta').textContent=todayStr+' · '+todayItems[0].w+(todayItems[0].g==='word'?' · Word':'');
    window._focusItem=todayItems[0];
  }else{fc.classList.remove('show')}

  // List
  const list=document.getElementById('itemList');
  list.innerHTML='';

  if(items.length===0){
    list.innerHTML='<div class="empty"><div class="big">📭</div>No content yet<br>Content will be ready by Sunday evening</div>';
    return;
  }

  // Sort by date, then by type (lesson first, then word)
  const sorted=[...items].sort((a,b)=>{
    if(a.d!==b.d)return a.d.localeCompare(b.d);
    return a.g==='lesson'?-1:1;
  });

  // Group by date
  let currentDate='';
  sorted.forEach(l=>{
    if(l.d!==currentDate){
      currentDate=l.d;
      const sep=document.createElement('div');
      sep.className='section-label';
      const dt=new Date(l.d+'T12:00:00');
      const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      sep.textContent=l.d+' · '+dayNames[dt.getDay()];
      list.appendChild(sep);
    }

    const card=document.createElement('div');
    card.className='item';
    card.onclick=()=>openItem(l);

    let tagClass='upcoming';let tagText='New';
    if(l.d<todayStr){tagClass='done';tagText='Done'}
    if(todayStr===l.d){tagClass='today';tagText='Today'}
    const bg=l.g==='word'?'#fce4ec':'#e3f2fd';

    card.innerHTML=`
      <div class="ic" style="background:${bg}">${l.i}</div>
      <div class="info">
        <div class="title">${l.t}</div>
        <div class="meta">${l.g==='word'?'Word of the Day':''}</div>
      </div>
      <div class="tag ${tagClass}">${tagText}</div>
    `;
    list.appendChild(card);
  });
}

/* ===== OPEN ITEM ===== */
function openItem(item){
  document.getElementById('content').classList.remove('show');
  const d=document.getElementById('detail');
  d.classList.add('show');
  const ifr=document.getElementById('iframe');
  ifr.srcdoc='<html><body style="font-family:sans-serif;padding:40px;text-align:center;color:#999"><h2>Loading...</h2></body></html>';
  fetch(item.f).then(r=>{if(!r.ok)throw Error();return r.text()}).then(h=>{ifr.srcdoc=h}).catch(()=>{
    ifr.srcdoc='<html><body style="font-family:sans-serif;padding:40px;text-align:center;color:#999"><h2>⏳ Coming Soon</h2><p style="font-size:14px;color:#6c757d">Will be available on '+item.d+'</p></body></html>'
  });
}

function openFocus(){if(window._focusItem)openItem(window._focusItem)}
function closeDetail(){document.getElementById('detail').classList.remove('show');document.getElementById('content').classList.add('show')}

/* ===== FULLSCREEN ===== */
function goFullscreen(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{})}
  else{document.exitFullscreen().catch(()=>{})}
}
document.addEventListener('fullscreenchange',()=>{
  document.getElementById('fsBtn').textContent=document.fullscreenElement?'✕':'⛶';
});

/* ===== DARK MODE ===== */
function toggleDark(){
  document.body.classList.toggle('dark');
  const isDark=document.body.classList.contains('dark');
  document.getElementById('darkBtn').textContent=isDark?'☀️':'🌙';
  try{sessionStorage.setItem('ed',isDark?'1':'0')}catch(e){}
}
// Restore dark mode
try{if(sessionStorage.getItem('ed')==='1'){document.body.classList.add('dark');document.getElementById('darkBtn').textContent='☀️'}}catch(e){}

/* ===== BOOT ===== */
if(sessionStorage.getItem('ea')==='1'){document.getElementById('login-screen').classList.add('hidden');init()}
</script>
</body>
</html>
