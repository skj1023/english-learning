<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Echo English · Lance</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.5;color:#1c1c1e;background:#f2f2f7;-webkit-font-smoothing:antialiased;transition:background .35s,color .35s}
  body.dark{background:#000000;color:#f5f5f7}

  /* ── iOS Color Palette ── */
  :root{--accent:#007AFF;--accent-dark:#0A84FF;--green:#34C759;--orange:#FF9500;--red:#FF3B30;--gray:#8e8e93;--bg:#f2f2f7;--card:#ffffff;--separator:#e9ecef;--dark-bg:#000000;--dark-card:#1c1c1e;--dark-sep:#2c2c2e;--label:#1c1c1e;--dark-label:#f5f5f7}

  /* ── Dark Mode Overrides ── */
  body.dark{--bg:#000000;--card:#1c1c1e;--separator:#2c2c2e;--label:#f5f5f7}
  body.dark .top-bar{background:rgba(0,0,0,.85)}
  body.dark .btm-bar{background:rgba(0,0,0,.85)!important;border-top-color:#2c2c2e!important}
  body.dark .week-btn{color:#636366}
  body.dark .week-btn.active{color:#0A84FF;border-bottom-color:#0A84FF}
  body.dark .cat-btn{color:#98989d;background:#1c1c1e}
  body.dark .cat-btn.active{background:#1c1c1e;color:#0A84FF}
  body.dark .section{background:#1c1c1e!important;border-color:#2c2c2e!important}
  body.dark .item{background:#1c1c1e;border-color:#2c2c2e}
  body.dark .item .title{color:#f5f5f7}
  body.dark .item .meta{color:#8e8e93}
  body.dark .focus-card{background:linear-gradient(135deg,#1a1a2e,#2d1b69)!important}
  body.dark .focus-card .fi-t{color:#f5f5f7}
  body.dark .focus-card .fi-s{color:#98989d}
  body.dark .toolbar-btn{background:#1c1c1e;color:#98989d;border-color:#2c2c2e}
  body.dark .today-btn{background:#004C99}
  body.dark .login-box{background:#1c1c1e}
  body.dark .login-box input{background:#000;border-color:#2c2c2e;color:#f5f5f7}
  body.dark .login-box h1{color:#f5f5f7}
  body.dark .login-box p{color:#8e8e93}
  body.dark .lesson-frame{border-color:#2c2c2e;background:#1c1c1e}
  body.dark .footer{color:#48484a}
  body.dark .section-label{color:#8e8e93}
  body.dark .empty{color:#48484a}
  body.dark .week-btn.past{color:#48484a}
  body.dark .word-pill{background:#2d1a1a;border-color:#4a2a2a}
  body.dark .word-pill .wp-t{color:#f5f5f7}
  body.dark .btm-btn{color:#636366}
  body.dark .btm-btn.active{color:#0A84FF}
  body.dark .btm-icon{color:#636366}
  body.dark .btm-icon:active{background:#1c1c1e}
  body.dark .vocab-top{background:rgba(0,0,0,.85)}
  body.dark .vb-btn{background:#1c1c1e;border-color:#2c2c2e;color:#98989d}
  body.dark .vocab-vt button{background:#1c1c1e;color:#98989d}
  body.dark .vocab-vt button.active{background:#004C99;color:#fff}
  body.dark .vocab-sort button{background:#1c1c1e;border-color:#2c2c2e;color:#636366}
  body.dark .vocab-sort button.active{background:#004C99;border-color:#004C99;color:#fff}
  body.dark .vocab-card{background:#1c1c1e;border-color:#2c2c2e}
  body.dark .vocab-card .vm{color:#8e8e93}
  body.dark .vocab-card .vs.lern{background:#4a2a0a;color:#ffb74d}
  body.dark .vocab-card .vs.mast{background:#1a3a1a;color:#81c784}
  body.dark .back-pill{background:rgba(10,132,255,.2);color:#f5f5f7}
  body.dark .focus-card .fi-b{background:#0A84FF}
  body.dark .igi .section-inner{background:#1c1c1e}
  body.dark .igi .section-inner .isi-title{color:#f5f5f7}
  body.dark .igi .section-inner .isi-meta{color:#8e8e93}
  body.dark .igi .section-inner .isi-tag.upcoming{color:#0A84FF}
  body.dark .igi .section-inner .isi-tag.today{color:#FF9500}
  body.dark .igi .section-inner .isi-tag.done{color:#34C759}

  /* ── Login ── */
  #login-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999}
  #login-screen.hidden{display:none}
  .login-box{background:#1c1c1e;border-radius:16px;padding:36px 28px;width:88%;max-width:360px;text-align:center}
  .login-box h1{font-size:24px;font-weight:700;color:#f5f5f7;margin-bottom:4px}
  .login-box p{font-size:14px;color:#8e8e93;margin-bottom:20px}
  .login-box input{width:100%;padding:14px;border:1px solid #2c2c2e;border-radius:10px;background:#000;color:#f5f5f7;font-size:16px;outline:none}
  .login-box input:focus{border-color:#0A84FF}
  .login-box button{width:100%;padding:14px;margin-top:10px;background:#007AFF;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer}
  .login-box .error{color:#FF3B30;font-size:13px;margin-top:8px;display:none}

  /* ── Large Title Top Bar ── */
  .top-bar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);padding:0 16px 0;transition:background .35s}
  .large-title-wrap{display:flex;align-items:flex-end;justify-content:space-between;padding:10px 0 4px;transition:padding .25s}
  .large-title-wrap.small{padding:4px 0 2px}
  .lt-date{font-size:32px;font-weight:700;color:var(--label);line-height:1.1;transition:font-size .25s,color .35s}
  .large-title-wrap.small .lt-date{font-size:20px}
  .lt-sub{font-size:14px;color:#8e8e93;margin-top:1px;transition:font-size .25s,opacity .25s}
  .large-title-wrap.small .lt-sub{font-size:12px;opacity:.7}
  .lt-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-bottom:2px}
  .lt-actions .today-btn{padding:6px 14px;background:#007AFF;color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
  .lt-actions .today-btn:active{background:#0066CC}
  .large-title-wrap.small .lt-actions .today-btn{padding:4px 10px;font-size:11px}
  #scrollSentinel{position:absolute;top:0;left:0;width:1px;height:1px;pointer-events:none}

  /* ── Week Tabs ── */
  .week-tabs{display:flex;gap:0;overflow-x:auto;padding:2px 0 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .week-tabs::-webkit-scrollbar{display:none}
  .week-btn{flex-shrink:0;padding:6px 12px;font-size:12px;font-weight:600;color:#8e8e93;background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s}
  .week-btn.active{color:var(--label);border-bottom-color:#007AFF}
  .week-btn.past{opacity:.5;font-style:italic}
  .week-btn.past:hover{opacity:1}
  .week-btn.past.active{opacity:1;font-style:normal}

  /* ── Category Tabs ── */
  .cat-tabs{display:flex;gap:6px;margin:0 0 10px;padding:0}
  .cat-btn{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:#e5e5ea;color:#636366;transition:all .2s}
  .cat-btn.active{background:#007AFF;color:#fff}

  /* ── Word Pill ── */
  .word-pill{display:none;background:#fff5f5;border:1px solid #fce4ec;border-radius:12px;padding:10px 14px;margin:0 0 10px;align-items:center;gap:10px}
  .word-pill.show{display:flex}
  .word-pill .wp-i{font-size:20px}
  .word-pill .wp-info{flex:1}
  .word-pill .wp-t{font-size:15px;font-weight:600}
  .word-pill .wp-s{font-size:12px;color:#8e8e93}
  .word-pill .wp-b{padding:6px 14px;background:#c62828;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0}

  /* ── Focus Card ── */
  .focus-card{display:none;background:linear-gradient(135deg,#e3f2fd,#f3e5f5);border-radius:14px;padding:14px 16px;margin:0 0 14px}
  .focus-card.show{display:flex;align-items:center;gap:12px}
  .focus-card .fi{flex:1}
  .focus-card .fi-t{font-size:15px;font-weight:600;color:#1c1c1e}
  .focus-card .fi-s{font-size:12px;color:#8e8e93;margin-top:2px}
  .focus-card .fi-b{padding:7px 16px;background:#007AFF;color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}

  /* ── iOS Inset Grouped Items ── */
  .igi{margin:0 16px;padding:0}
  .igi .section-label{font-size:13px;font-weight:400;color:#8e8e93;text-transform:uppercase;letter-spacing:.3px;margin:20px 0 6px;padding:0 16px}
  .igi .section-inner{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:0;border:none;box-shadow:none}
  .igi .section-inner .isi-item{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--separator);transition:background .15s;position:relative}
  .igi .section-inner .isi-item:first-child{border-top-left-radius:12px;border-top-right-radius:12px}
  .igi .section-inner .isi-item:last-child{border-bottom:none;border-bottom-left-radius:12px;border-bottom-right-radius:12px}
  .igi .section-inner .isi-item:active{background:rgba(0,0,0,.04)}
  body.dark .igi .section-inner .isi-item:active{background:rgba(255,255,255,.04)}
  .igi .section-inner .isi-item .isi-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .igi .section-inner .isi-item .isi-info{flex:1;min-width:0}
  .igi .section-inner .isi-item .isi-title{font-size:15px;font-weight:500;color:#1c1c1e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .igi .section-inner .isi-item .isi-meta{font-size:12px;color:#8e8e93;margin-top:0}
  .igi .section-inner .isi-item .isi-tag{font-size:11px;font-weight:500;flex-shrink:0}
  .igi .section-inner .isi-item .isi-tag.today{color:#FF9500}
  .igi .section-inner .isi-item .isi-tag.done{color:#34C759}
  .igi .section-inner .isi-item .isi-tag.upcoming{color:#007AFF}
  .igi .section-inner .isi-item .isi-chev{color:#c7c7cc;font-size:14px;flex-shrink:0;margin-left:4px}
  body.dark .igi .section-inner .isi-item .isi-chev{color:#48484a}

  /* ── Detail ── */
  #content{display:none;max-width:640px;margin:0 auto;padding:0 0 76px;min-height:100dvh}
  #content.show{display:block}
  #detail{display:none;max-width:640px;margin:0 auto;padding:0 0 60px}
  #detail.show{display:block}
  .lesson-frame{border:none;border-radius:12px;overflow:hidden;background:#fff;margin:0 16px 16px}
  .lesson-frame iframe{width:100%;height:100dvh;border:none;display:block}

  .empty{padding:40px 20px;text-align:center;color:#8e8e93;font-size:14px;line-height:1.8}
  .empty .big{font-size:36px;margin-bottom:8px}
  .footer{text-align:center;padding:20px 0;font-size:11px;color:#c7c7cc}

  /* ── Views ── */
  #vocabView,#phraseView,#pastView{display:none;max-width:640px;margin:0 auto;padding:0 0 60px;min-height:100dvh}
  #vocabView.show,#phraseView.show,#pastView.show{display:block}
  .vocab-top{display:flex;align-items:center;gap:8px;padding:12px 16px;background:rgba(255,255,255,.85);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;transition:background .35s}
  .vocab-top h2{font-size:22px;font-weight:700;flex:1;color:var(--label);transition:color .35s}
  .vb-btn{padding:6px 12px;font-size:12px;font-weight:600;background:none;border:1px solid #e0e0e0;border-radius:6px;cursor:pointer;color:#8e8e93;flex-shrink:0;display:flex;align-items:center;gap:4px;white-space:nowrap}
  .vocab-vt{display:flex;gap:8px;padding:0 16px 10px}
  .vocab-vt button{padding:5px 14px;border-radius:16px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:#e5e5ea;color:#636366}
  .vocab-vt button.active{background:#007AFF;color:#fff}
  .vocab-sort{display:flex;gap:6px;padding:0 16px 10px}
  .vocab-sort button{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;border:1px solid #e0e0e0;cursor:pointer;background:#fff;color:#8e8e93}
  .vocab-sort button.active{background:#007AFF;color:#fff;border-color:#007AFF}
  .vocab-card{background:#fff;border-radius:12px;padding:12px 14px;margin:0 16px 6px;border:1px solid #f0f0f0;cursor:pointer;display:flex;align-items:center;gap:10px}
  .vocab-card .vw{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .vocab-card .vi{flex:1;min-width:0}
  .vocab-card .vt{font-size:15px;font-weight:600}
  .vocab-card .vm{font-size:12px;color:#8e8e93;margin-top:1px}
  .vocab-card .vs{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:600;flex-shrink:0}
  .vocab-card .vs.lern{background:#fff3e0;color:#FF9500}
  .vocab-card .vs.mast{background:#e8f5e9;color:#34C759}
  .vocab-empty{padding:40px 20px;text-align:center;color:#8e8e93;font-size:14px;line-height:1.8}
  .vocab-empty .big{font-size:36px;margin-bottom:8px}

  /* ── Bottom Tab Bar ── */
  .btm-bar{position:fixed;bottom:0;left:0;right:0;z-index:9998;background:rgba(255,255,255,.85)!important;-webkit-backdrop-filter:blur(20px)!important;backdrop-filter:blur(20px)!important;border-top:1px solid rgba(0,0,0,.1);display:flex;align-items:stretch;height:54px;padding-bottom:env(safe-area-inset-bottom,0);transition:background .35s}
  .btm-tabs{display:flex;flex:1;align-items:stretch;gap:0}
  .btm-btn{flex:1;border:none;background:none;font-size:10px;font-weight:600;color:#8e8e93;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:4px 0;transition:color .2s;user-select:none;font-family:inherit}
  .btm-btn:active{opacity:.7}
  .btm-btn .btm-icon-big{font-size:22px;line-height:1.1}
  .btm-btn .btm-lbl{font-size:10px;margin-top:-2px}
  .btm-btn.active{color:#007AFF}
  .btm-right{display:flex;align-items:center;gap:2px;padding:0 6px}
  .btm-icon{width:34px;height:34px;border-radius:50%;border:none;background:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#8e8e93;transition:background .2s;flex-shrink:0}
  .btm-icon:active{background:rgba(0,0,0,.05)}
  .btm-back-detail{display:none;flex:1;align-items:center;padding:0 8px 0 12px}
  .back-pill{padding:6px 16px;border-radius:20px;background:rgba(0,122,255,.2);color:#007AFF;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s;user-select:none}
  .back-pill:active{background:rgba(0,122,255,.3);transform:scale(.96)}

  /* ── Animations ── */
  #content,#vocabView,#phraseView,#pastView,#detail{animation:viewIn .3s cubic-bezier(.22,1,.36,1)}
  @keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .isi-item{animation:itemIn .3s cubic-bezier(.22,1,.36,1) both}
  .isi-item:nth-child(1){animation-delay:0s}
  .isi-item:nth-child(2){animation-delay:.03s}
  .isi-item:nth-child(3){animation-delay:.06s}
  .isi-item:nth-child(4){animation-delay:.09s}
  .isi-item:nth-child(5){animation-delay:.12s}
  .isi-item:nth-child(6){animation-delay:.15s}
  .isi-item:nth-child(7){animation-delay:.18s}
  .isi-item:nth-child(8){animation-delay:.21s}
  .isi-item:nth-child(9){animation-delay:.24s}
  .isi-item:nth-child(10){animation-delay:.27s}
  @keyframes itemIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  @media(max-width:480px){
    .btm-bar{height:50px}
    .btm-btn{font-size:9px}.btm-btn .btm-lbl{font-size:9px}.btm-btn .btm-icon-big{font-size:20px}
    .btm-icon{width:30px;height:30px;font-size:14px}
    .lt-date{font-size:28px}
    .large-title-wrap.small .lt-date{font-size:18px}
  }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>🔐 Echo English</h1>
    <p>Lance's Learning Hub</p>
    <input type="password" id="pw" placeholder="Enter password" autofocus>
    <button id="loginBtn">Unlock</button>
    <div class="error" id="login-err">Incorrect password</div>
  </div>
</div>

<div id="content">
  <div class="top-bar" id="topBar">
    <div id="scrollSentinel"></div>
    <div class="large-title-wrap" id="largeTitleWrap">
      <div>
        <div class="lt-date" id="ltDate">📅 Mon, Jul 6</div>
        <div class="lt-sub">Echo English</div>
      </div>
      <div class="lt-actions">
        <button class="today-btn" id="todayBtn">📅 Today</button>
      </div>
    </div>
    <div class="week-tabs" id="weekTabs"></div>
    <div class="cat-tabs" id="catTabs" style="margin-top:6px"></div>
  </div>

  <div style="padding:0">
    <div class="word-pill" id="wordPill" style="margin:10px 16px 0">
      <div class="wp-i">💡</div>
      <div class="wp-info">
        <div class="wp-t" id="wordTitle"></div>
        <div class="wp-s" id="wordMeta">Today's Word</div>
      </div>
      <button class="wp-b" id="wordBtn">Open</button>
    </div>

    <div class="focus-card" id="focusCard" style="margin:0 16px">
      <div class="fi">
        <div class="fi-t" id="focusTitle"></div>
        <div class="fi-s" id="focusMeta"></div>
      </div>
      <button class="fi-b" id="focusBtn">▶ Open</button>
    </div>

    <div class="igi" id="itemList" style="margin-bottom:20px"></div>
  </div>
  <div class="footer">Echo · daily</div>
</div>

<div id="detail">
  <div class="lesson-frame"><iframe id="iframe"></iframe></div>
</div>

<div id="vocabView">
  <div class="vocab-top">
    <h2>📕 Vocab Book</h2>
  </div>
  <div class="vocab-vt" id="vocabTabs">
    <button class="active" data-vt="lern">🔴 Learning</button>
    <button data-vt="mast">✅ Mastered</button>
  </div>
  <div class="vocab-sort" id="vocabSort">
    <button data-vs="az">A→Z</button>
    <button class="active" data-vs="date">By Date ↓</button>
  </div>
  <div id="vocabList"></div>
</div>

<div id="pastView">
  <div class="vocab-top">
    <h2>📜 Past Content</h2>
  </div>
  <div class="vocab-vt" id="pastTabs">
    <button class="active" data-past="unlearned">🔴 Not Learned</button>
    <button data-past="learned">✅ Learned</button>
  </div>
  <div class="vocab-sort" id="pastSort">
    <button data-pasts="az">A→Z</button>
    <button class="active" data-pasts="date">By Date ↓</button>
  </div>
  <div id="pastList"></div>
</div>

<div id="phraseView">
  <div class="vocab-top">
    <h2>🧩 Phrase Book</h2>
  </div>
  <div class="vocab-vt" id="phraseTabs">
    <button class="active" data-pt="lern">🔴 Learning</button>
    <button data-pt="mast">✅ Mastered</button>
  </div>
  <div class="vocab-sort" id="phraseSort">
    <button data-ps="az">A→Z</button>
    <button class="active" data-ps="date">By Date ↓</button>
  </div>
  <div id="phraseList"></div>
</div>

<div class="btm-bar" id="btmBar">
  <div class="btm-tabs" id="btmTabs">
    <button class="btm-btn active" data-tab="home"><span class="btm-icon-big">🏠</span><span class="btm-lbl">Home</span></button>
    <button class="btm-btn" data-tab="vocab"><span class="btm-icon-big">📕</span><span class="btm-lbl">Words</span></button>
    <button class="btm-btn" data-tab="phrases"><span class="btm-icon-big">🧩</span><span class="btm-lbl">Phrases</span></button>
    <button class="btm-btn" data-tab="past"><span class="btm-icon-big">📜</span><span class="btm-lbl">Past</span></button>
  </div>
  <div class="btm-right" id="btmRight">
    <button class="btm-icon" id="darkBtn">🌙</button>

/* ===== Beijing Date ===== */
function getBeijingDate(){
  var d=new Date();
  var opts={timeZone:'Asia/Shanghai',year:'numeric',month:'2-digit',day:'2-digit'};
  var parts=new Intl.DateTimeFormat('en-CA',opts).formatToParts(d);
  return parts[0].value+'-'+parts[2].value+'-'+parts[4].value;
}

/* ===== PASSWORD ===== */
async function sha256(s){
  var b=new TextEncoder().encode(s);
  var h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(function(x){return x.toString(16).padStart(2,'0')}).join('');
}
async function login(){
  var v=document.getElementById('pw').value;
  if(await sha256(v)===PWH){
    document.getElementById('login-screen').classList.add('hidden');
    init();
  }else{
    document.getElementById('login-err').style.display='block';
    document.getElementById('pw').value='';document.getElementById('pw').focus();
  }
}
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')login()});
document.getElementById('loginBtn').addEventListener('click',login);

function getWeekStart(d){var dt=new Date(d);var day=dt.getDay();var diff=dt.getDate()-day+(day===0?-6:1);dt.setDate(diff);return dt.toISOString().slice(0,10)}
function addDays(d,n){var dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10)}

/* ===== iOS Large Title Scroll ===== */

/* ===== BUILD WEEKS ===== */
function buildWeeks(){
  var groups={};
  lessons.forEach(function(l){var ws=getWeekStart(l.d);if(!groups[ws])groups[ws]=[];groups[ws].push(l)});
  var keys=Object.keys(groups).sort();
  var tabs=document.getElementById('weekTabs');
  tabs.innerHTML='';

  var now=todayStr;
  var found=false;
  var pastKeys=[];
  keys.forEach(function(k){
    var end=addDays(k,6);
    if(now>=k&&now<=end&&!found){currentWeek=k;found=true}
    if(end<now)pastKeys.push(k);
  });
  if(!currentWeek&&keys.length>0)currentWeek=keys[keys.length-1];
  _realWeek=currentWeek;

  // Past weeks (reversed: most recent first)
  if(showHistory){
    pastKeys.slice().reverse().forEach(function(k){
      var end=addDays(k,6);
      var btn=document.createElement('button');
      btn.className='week-btn past';
      btn.textContent=k.slice(5)+'-'+end.slice(5);
      btn.dataset.week=k;
      btn.addEventListener('click',function(){switchWeek(k)});
      tabs.appendChild(btn);
    });
  }

  // Current + future weeks
  keys.forEach(function(k){
    var end=addDays(k,6);
    if(end<now)return;
    var btn=document.createElement('button');
    btn.className='week-btn';
    btn.textContent=k.slice(5)+'-'+end.slice(5);
    btn.dataset.week=k;
    btn.addEventListener('click',function(){switchWeek(k)});
    tabs.appendChild(btn);
  });

  var ct=document.getElementById('catTabs');
  ct.innerHTML='';
  ['all','lessons','words'].forEach(function(c){
    var b=document.createElement('button');
    b.className='cat-btn'+(c===currentCat?' active':'');
    b.textContent=c==='all'?'All':c==='lessons'?'📖 Lessons':'💡 Words';
    b.addEventListener('click',function(){switchCat(c)});
    ct.appendChild(b);
  });
}

  ['content','vocabView','phraseView','pastView'].forEach(function(v){document.getElementById(v).classList.remove('show');});
  if(tab==='home') document.getElementById('content').classList.add('show');

}
function switchCat(c){

  document.querySelectorAll('.cat-btn').forEach(function(b){
    b.classList.toggle('active',b.textContent.indexOf(c==='all'?'All':c==='lessons'?'Lessons':'Words')>=0);

  try{var w=sessionStorage.getItem('ew');if(w)currentWeek=w;

}

/* ===== RENDER (iOS Inset Grouped) ===== */
function render(){
  var end=addDays(currentWeek,6);
  var items=lessons.filter(function(l){return l.d>=currentWeek&&l.d<=end});
  if(currentWeek===_realWeek){
    items=items.filter(function(l){return l.d>=todayStr||l.d===currentWeek});
  }
  if(currentCat==='lessons'){items=items.filter(function(l){return l.g==='lesson'})}
  else if(currentCat==='words'){items=items.filter(function(l){return l.g==='word'})}

  // Word pill
  var wp=document.getElementById('wordPill');
  var wordItem=items.filter(function(l){return l.g==='word'&&l.d===todayStr})[0];
  if(wordItem){
    wp.classList.add('show');
    document.getElementById('wordTitle').textContent=wordItem.t;
    document.getElementById('wordMeta').textContent=todayStr+' · '+wordItem.w;
    document.getElementById('wordBtn').onclick=function(){openItem(wordItem)};
  }else{wp.classList.remove('show')}

  // Focus card
  var fc=document.getElementById('focusCard');
  var lessonItem=items.filter(function(l){return l.g==='lesson'&&l.d===todayStr})[0];
  if(lessonItem){
    fc.classList.add('show');
    document.getElementById('focusTitle').textContent=lessonItem.t;
    document.getElementById('focusMeta').textContent=todayStr+' · '+lessonItem.w;
    document.getElementById('focusBtn').onclick=function(){openItem(lessonItem)};
  }else{fc.classList.remove('show')}

  // List - iOS Inset Grouped style
  var list=document.getElementById('itemList');
  list.innerHTML='';
  if(items.length===0){
    list.innerHTML='<div class="igi"><div class="empty"><div class="big">📭</div>Nothing here yet</div></div>';
    return;
  }
  var sorted=[].concat(items).sort(function(a,b){
    if(a.d!==b.d)return a.d<b.d?-1:1;
    return a.g==='lesson'?-1:1;
  });
  var currentDate='';
  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  sorted.forEach(function(l){
    if(l.d!==currentDate){
      currentDate=l.d;
      // Close previous section
      var prevGroup=list.querySelector('.isi-group:last-of-type');
      if(prevGroup)prevGroup.querySelectorAll('.isi-item').forEach(function(el,i,arr){
        el.classList.toggle('first',i===0);
        el.classList.toggle('last',i===arr.length-1);
      });
      // New section label
      var dt=new Date(l.d+'T12:00:00');
      var sep=document.createElement('div');
      sep.className='section-label';
      sep.style.padding='0';
      sep.textContent=l.d+' · '+dayNames[dt.getDay()];
      list.appendChild(sep);
      // New group wrapper
      var group=document.createElement('div');
      group.className='section-inner isi-group';
      list.appendChild(group);
    }
    var group=list.querySelector('.isi-group:last-of-type');
    var card=document.createElement('div');
    card.className='isi-item';
    card.addEventListener('click',function(){openItem(l)});
    var tagClass='upcoming',tagText='New';
    if(l.d<todayStr){tagClass='done';tagText='✓'}
    if(l.d===todayStr){tagClass='today';tagText='★ Today'}
    var bg=l.g==='word'?'#fce4ec':'#e3f2fd';
    card.innerHTML='<div class="isi-ic" style="background:'+bg+'">'+l.i+'</div>'+
      '<div class="isi-info"><div class="isi-title">'+l.t+'</div>'+
      '<div class="isi-meta">'+(l.g==='word'?'Word of the Day':'')+'</div></div>'+
      '<div class="isi-tag '+tagClass+'">'+tagText+'</div>'+
      '<span class="isi-chev">›</span>';
    group.appendChild(card);
  });
  // Fix last group
  var lastGroup=list.querySelector('.isi-group:last-of-type');
  if(lastGroup)lastGroup.querySelectorAll('.isi-item').forEach(function(el,i,arr){
    el.classList.toggle('first',i===0);
    el.classList.toggle('last',i===arr.length-1);
  });
}

var _vocabTab='lern',_vocabSort='date';

/* ===== BACK / NAVIGATION ===== */
function updateBtmBar(){
  var inDetail=document.getElementById('detail').classList.contains('show');
  document.getElementById('btmTabs').style.display=inDetail?'none':'flex';
  document.getElementById('btmRight').style.display='flex';
  document.getElementById('backDetail').style.display=inDetail?'flex':'none';
}

/* ===== BACK PILL ===== */
function goBack(){
  window.scrollTo(0,0);
  var d=document.getElementById('detail');
  d.classList.remove('show');
  if(_prevView&&_prevView!=='home'){switchTab(_prevView)}else{
    document.getElementById('content').classList.add('show');
    updateBtmBar();
  }
}
document.getElementById('backPillBtn').addEventListener('click',goBack);

/* ===== FULLSCREEN ===== */
function goFullscreen(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen()}else{document.exitFullscreen()}
}
document.getElementById('fsBtn').addEventListener('click',goFullscreen);
document.addEventListener('fullscreenchange',function(){
  document.getElementById('fsBtn').textContent=document.fullscreenElement?'✕':'⛶';
});

/* ===== DARK MODE ===== */
function toggleDark(){
  document.body.classList.toggle('dark');
  var isDark=document.body.classList.contains('dark');
  document.getElementById('darkBtn').textContent=isDark?'☀️':'🌙';
  try{sessionStorage.setItem('ed',isDark?'1':'0')}catch(e){}
}
document.getElementById('darkBtn').addEventListener('click',toggleDark);
try{var d=sessionStorage.getItem('ed');if(d==='1'||d===null){document.body.classList.add('dark');
document.getElementById('darkBtn').textContent='☀️'}}catch(e){}

/* ===== TODAY ===== */
document.getElementById('todayBtn').addEventListener('click',goToday);
function goToday(){
  var items=lessons.filter(function(l){return l.d===todayStr});
  if(items.length===0){
    switchWeek(getWeekStart(todayStr));window.scrollTo(0,0);return;
  }
  var tdL=items.filter(function(l){return l.g==='lesson'})[0];
  var tdW=items.filter(function(l){return l.g==='word'})[0];
  openItem(tdL||tdW);
}

/* ===== VOCAB BOOK ===== */
function showVocabBook(){
  document.getElementById('content').classList.remove('show');
  document.getElementById('vocabView').classList.add('show');
  renderVocab();
  updateBtmBar();
}
function hideVocabBook(){
  document.getElementById('vocabView').classList.remove('show');
  document.getElementById('content').classList.add('show');
  updateBtmBar();
}
document.getElementById('vocabTabs').addEventListener('click',function(e){
  var b=e.target.closest('button');
  if(!b||!b.dataset.vt)return;
  _vocabTab=b.dataset.vt;
  document.querySelectorAll('#vocabTabs button').forEach(function(x){x.classList.toggle('active',x===b)});
  renderVocab();
});
document.getElementById('vocabSort').addEventListener('click',function(e){
  var b=e.target.closest('button');
  if(!b||!b.dataset.vs)return;
  _vocabSort=b.dataset.vs;
  document.querySelectorAll('#vocabSort button').forEach(function(x){x.classList.toggle('active',x===b)});
  renderVocab();
});
function vocabSlug(w){return String(w).toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'word'}
function renderVocab(){
  var list=document.getElementById('vocabList');
  var items=vocabBook.filter(function(v){return _vocabTab==='lern'?!v.m:!!v.m});
  if(items.length===0){
    list.innerHTML='<div class="vocab-empty"><div class="big">📭</div>'+
      (_vocabTab==='lern'?'No words in learning yet':'No mastered words yet')+'</div>';
    return;
  }
  var sorted=[].concat(items);
  if(_vocabSort==='az'){sorted.sort(function(a,b){return a.w<b.w?-1:1})}
  else{sorted.sort(function(a,b){return a.d<b.d?1:-1})}
  list.innerHTML='';
  sorted.forEach(function(v){
    var card=document.createElement('div');
    card.className='vocab-card';
    card.addEventListener('click',function(){
      var item={t:v.w,i:'💡',g:'word',f:'lessons/'+v.d+'_wotd_'+vocabSlug(v.w)+'.html'};
      openItem(item);
    });
    var tag=v.m?'mast':'lern';
    var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var dt=new Date(v.d+'T12:00:00');
    card.innerHTML='<div class="vw">💡</div>'+
      '<div class="vi"><div class="vt">'+v.w+'</div><div class="vm">'+v.d+' · '+dayNames[dt.getDay()]+'</div></div>'+
      '<div class="vs '+tag+'">'+(v.m?'✅ Mastered':'🔴 Learning')+'</div>';
    list.appendChild(card);
  });
}

/* ===== PAST CONTENT ===== */
var _prevView='home',_pastTab='unlearned',_pastSort='date';
function pastKey(l){return l.g+':'+l.d+':'+l.t}
function isLearned(l){return learnedItems.indexOf(pastKey(l))>=0}
function showPastView(){
  document.getElementById('content').classList.remove('show');
  document.getElementById('pastView').classList.add('show');
  renderPastView();
  updateBtmBar();
}
document.getElementById('pastTabs').addEventListener('click',function(e){
  var b=e.target.closest('button');
  if(!b||!b.dataset.past)return;
  _pastTab=b.dataset.past;
  document.querySelectorAll('#pastTabs button').forEach(function(x){x.classList.toggle('active',x===b)});
  renderPastView();
});
document.getElementById('pastSort').addEventListener('click',function(e){
  var b=e.target.closest('button');
  if(!b||!b.dataset.pasts)return;
  _pastSort=b.dataset.pasts;
  document.querySelectorAll('#pastSort button').forEach(function(x){x.classList.toggle('active',x===b)});
  renderPastView();
});
function renderPastView(){
  var list=document.getElementById('pastList');
  var items=lessons.filter(function(l){return l.d<todayStr});
  items=items.filter(function(l){return _pastTab==='learned'?isLearned(l):!isLearned(l)});
  if(items.length===0){
    list.innerHTML='<div class="vocab-empty"><div class="big">📭</div>'+(_pastTab==='learned'?'No learned past content yet':'No unlearned past content')+'</div>';
    return;
  }
  var sorted=[].concat(items);
  if(_pastSort==='az'){sorted.sort(function(a,b){return a.t<b.t?-1:1})}
  else{sorted.sort(function(a,b){if(a.d!==b.d)return a.d<b.d?1:-1;return a.g==='lesson'?-1:1})}
  list.innerHTML='';
  var currentDate='';
  sorted.forEach(function(l){
    if(l.d!==currentDate){
      currentDate=l.d;
      var sep=document.createElement('div');
      sep.className='section-label';
      sep.style.padding='0 16px';
      var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var dt=new Date(l.d+'T12:00:00');
      sep.textContent=l.d+' · '+dayNames[dt.getDay()];
      list.appendChild(sep);
    }
    var card=document.createElement('div');
    card.className='vocab-card';
    card.addEventListener('click',function(){_fromPast=true;openItem(l)});
    var tag=_pastTab==='learned'?'mast':'lern';
    var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var dt=new Date(l.d+'T12:00:00');
    card.innerHTML='<div class="vw">'+l.i+'</div>'+
      '<div class="vi"><div class="vt">'+l.t+'</div><div class="vm">'+l.d+' · '+dayNames[dt.getDay()]+' · '+(l.g==='word'?'Word':'Lesson')+'</div></div>'+
      '<div class="vs '+tag+'">'+(_pastTab==='learned'?'✅ Learned':'🔴 Not Learned')+'</div>';
    list.appendChild(card);
  });
}
